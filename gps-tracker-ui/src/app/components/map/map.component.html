<div class="layout-container">
  
  <div class="sidebar">
    <div class="header">
      <h2>Live Fleet Tracking</h2>
    </div>

    <div class="controls">
      <!-- Auto-refresh active -->
      <p style="font-size: 0.9em; color: #555;">Auto-syncing every 30s</p>

      <button 
        class="btn btn-secondary" 
        (click)="getLastKnownLocation()" 
        [disabled]="isFetching">
        Plot Last Location
      </button>
    </div>

    <div class="status-indicator" *ngIf="statusMessage" [class.success]="isSuccess">
      {{ statusMessage }}
    </div>
  </div>

  <div class="map-container">
    <div id="map"></div>
  </div>

</div>
